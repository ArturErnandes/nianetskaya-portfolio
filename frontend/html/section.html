<!DOCTYPE html>
<html lang="ru">
  <head>
      <meta charset="UTF-8">
      <title>Винецкая</title>
      <script>
          (function () {
              const sectionTitles = {
                  book_illustration: "Книжная иллюстрация",
                  easel_graphics: "Станковая графика",
                  graphic_design: "Графический дизайн",
                  academic_works: "Академические работы",
                  textile_design: "Дизайн текстиля",
              };
              const sectionSlug = window.location.pathname.replace(/^\/+|\/+$/g, "");
              const sectionTitle = sectionTitles[sectionSlug];

              if (sectionTitle) {
                  document.title = sectionTitle;
              }
          }());
      </script>
      <link rel="stylesheet" href="/frontend/css/section-page.css">
  </head>
  <body data-page="section">
    <header class="section-header">
      <a class="back-link" href="/" aria-label="Назад на главную">&lt;</a>
      <h1 data-section-heading></h1>
    </header>
    <section class="works">
        <ul class="works-list">
        </ul>
    </section>
    <script src="/frontend/js/config.js"></script>
    <script src="/frontend/js/works-cards.js"></script>
    <script src="/frontend/js/section-page.js"></script>
  </body>
</html>
